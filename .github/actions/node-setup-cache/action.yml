name: Node.js setup with node_modules cache
description: Run npm ci once and save node_modules to the Actions cache for downstream jobs.

inputs:
  node-version:
    description: Node.js version (e.g. 20.x or lts/*)
    required: true
  install-dependencies:
    description: Run npm ci before saving cache
    required: false
    default: 'true'
  working-directory:
    description: Directory containing package.json and package-lock.json (use . for repo root)
    required: false
    default: '.'

outputs:
  cache-key:
    description: Cache key for node-restore-cache
    value: ${{ steps.cache-keys.outputs.cache-key }}
  cache-hit:
    description: Whether node_modules was restored from cache
    value: ${{ steps.cache-node-modules.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Generate cache keys
      id: cache-keys
      shell: bash
      env:
        PKG_DIR: ${{ inputs.working-directory }}
      run: |
        NODE_VERSION="${{ inputs.node-version }}"
        WD="${PKG_DIR:-.}"
        if [ "$WD" = "." ]; then
          SLUG="root"
          LOCK="package-lock.json"
          PKG="package.json"
          NM="node_modules"
        else
          SLUG="${WD//\//-}"
          LOCK="${WD}/package-lock.json"
          PKG="${WD}/package.json"
          NM="${WD}/node_modules"
        fi
        BASE_KEY="node-modules-${{ runner.os }}-${NODE_VERSION}-${SLUG}"
        FINGERPRINT=""
        [ -f "$LOCK" ] && FINGERPRINT+=$(sha256sum "$LOCK" | awk '{print $1}')
        [ -f "$PKG" ] && FINGERPRINT+=$(sha256sum "$PKG" | awk '{print $1}')
        [ -z "$FINGERPRINT" ] && FINGERPRINT="no-lock"
        HASH_KEY="${BASE_KEY}-${FINGERPRINT:0:24}"
        echo "cache-key=${HASH_KEY}" >> "$GITHUB_OUTPUT"
        echo "base-key=${BASE_KEY}" >> "$GITHUB_OUTPUT"
        echo "node-modules-path=${NM}" >> "$GITHUB_OUTPUT"

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install dependencies
      if: inputs.install-dependencies == 'true'
      shell: bash
      env:
        PKG_DIR: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        WD="${PKG_DIR:-.}"
        if [ "$WD" != "." ]; then
          cd "$WD"
        fi
        if [ -f package-lock.json ]; then
          npm ci --ignore-scripts --no-audit --no-fund
        else
          npm install --ignore-scripts --no-audit --no-fund
        fi

    - name: Save node_modules cache
      id: cache-node-modules
      uses: actions/cache@v4
      with:
        path: ${{ steps.cache-keys.outputs.node-modules-path }}
        key: ${{ steps.cache-keys.outputs.cache-key }}
